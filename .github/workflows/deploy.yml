name: Deploy to WordPress.org

# ┌──────────────────────────────────────────────────────────────────────────┐
# │ NOT ENABLED. This plugin is not ready for a wordpress.org release yet.     │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Two independent guardrails keep this from publishing prematurely:
#   1. Manual trigger only. The automatic `release:` trigger is commented out,
#      so publishing a GitHub Release will NOT deploy anything.
#   2. Even a manual run is skipped unless the repository variable
#      WPORG_RELEASE_ENABLED is exactly 'true'.
#
# To enable a real release later:
#   - add the SVN_USERNAME / SVN_PASSWORD secrets (a wordpress.org account with
#     commit access to the approved `bunnify-frontend` plugin);
#   - set the repository variable WPORG_RELEASE_ENABLED = true;
#   - uncomment the `release:` trigger below.

on:
  workflow_dispatch:
  # release:
  #   types: [ published ]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    # Hard stop until the plugin is explicitly marked ready for release.
    if: ${{ vars.WPORG_RELEASE_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: WordPress.org plugin deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: bunnify-frontend
          # The installable plugin lives in a subdirectory of this repo.
          BUILD_DIR: ./bunnify-frontend
          # WordPress.org listing assets (banner/icon/screenshots).
          ASSETS_DIR: .wordpress-org
