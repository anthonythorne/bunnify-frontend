name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Lint, analyse & test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Coding standards (PHPCS)
        run: composer lint

      - name: Static analysis (PHPStan)
        run: composer analyse

      - name: Unit tests (PHPUnit)
        run: composer test

  package:
    name: Package (dist zip guards)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build distributable
        run: bash bin/build.sh

      - name: Assert zip contents
        run: |
          unzip -l dist/bunnify-frontend.zip > listing.txt
          grep -q "bunnify-frontend/autoload.php" listing.txt
          grep -q "bunnify-frontend/bunnify-frontend.php" listing.txt
          grep -q "bunnify-frontend/readme.txt" listing.txt
          if grep -E "composer\.(json|lock)|build-tools/|README\.md|\.distignore" listing.txt; then
            echo "dev/packaging cruft found in the zip" >&2
            exit 1
          fi
